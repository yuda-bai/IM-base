services:
  redis:
    image: redis:7-alpine
    container_name: ginchat-redis
    ports:
      - "16379:6379"
    command: redis-server --requirepass 123456 --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ginchat-network

  mysql:
    image: mysql:8.0
    container_name: ginchat-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ginchat
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - ginchat-network

volumes:
  redis-data:
  mysql-data:

networks:
  ginchat-network:
    driver: bridge
